name: Shipyard Release

on:
  schedule:
    - cron: "17 3 1,16 * *"
  workflow_dispatch:
  push:
    tags:
      - "colab-cli-v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SHIPYARD_GIT: https://github.com/keys-i/shipyard
  SHIPYARD_TAG: cargo-shipyard-v0.1.0

jobs:
  release-pr:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Shipyard
        run: cargo install --git "$SHIPYARD_GIT" --tag "$SHIPYARD_TAG" cargo-shipyard --locked
      - name: Plan release
        id: plan
        run: |
          cargo shipyard plan --json > shipyard-plan.json
          if grep -q '"noop": true' shipyard-plan.json; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No snack for the release animal today"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            cat shipyard-plan.json
          fi
      - name: Update release files
        if: steps.plan.outputs.needed == 'true'
        run: cargo shipyard update
      - name: Create or update release PR
        if: steps.plan.outputs.needed == 'true'
        run: cargo shipyard pr --base main

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Shipyard
        run: cargo install --git "$SHIPYARD_GIT" --tag "$SHIPYARD_TAG" cargo-shipyard --locked
      - name: Check release
        run: cargo shipyard release --dry-run
      - name: Publish release
        run: cargo shipyard release --yes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
